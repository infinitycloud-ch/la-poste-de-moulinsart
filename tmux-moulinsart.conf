# Configuration tmux pour La Poste de Moulinsart
# Fichier de configuration pour un meilleur affichage

# Configuration générale
set -g default-terminal "screen-256color"
set -g history-limit 10000
set -g mouse on

# Status bar personnalisée
set -g status-bg colour235
set -g status-fg colour136
set -g status-left-length 50
set -g status-right-length 50
set -g status-left '#[fg=green,bold]📮 MOULINSART #[fg=yellow]| '
set -g status-right '#[fg=cyan]%H:%M:%S #[fg=yellow]| #[fg=green]%d/%m/%Y '
set -g status-interval 1

# Style des bordures
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour226,bg=default

# Format des titres de panels
set -g pane-border-status top
set -g pane-border-format "#[fg=white,bg=blue,bold] #{pane_title} #[default]"

# Raccourcis utiles
bind r source-file ~/.tmux.conf \; display "Config rechargée!"
bind | split-window -h
bind - split-window -v
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Redimensionnement facile
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Layout préconfiguré pour 4 panels égaux
bind M select-layout even-vertical \; \
       resize-pane -t 0 -x 50% \; \
       resize-pane -t 2 -x 50%

# Synchronisation des panels (utile pour envoyer la même commande partout)
bind S setw synchronize-panes

# Couleurs par défaut pour les agents
# NESTOR = Jaune/Or
# TINTIN = Bleu/Cyan
# DUPONT1 = Vert
# DUPONT2 = Magenta/Violet