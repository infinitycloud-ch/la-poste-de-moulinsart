<svg width="100" height="80" viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="castleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355"/>
      <stop offset="100%" style="stop-color:#5D4E37"/>
    </linearGradient>
    <linearGradient id="roofGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B22222"/>
      <stop offset="100%" style="stop-color:#8B0000"/>
    </linearGradient>
  </defs>

  <!-- Terrain -->
  <rect x="0" y="65" width="100" height="15" fill="#2F4F2F"/>

  <!-- Corps principal du château -->
  <rect x="20" y="35" width="60" height="30" fill="url(#castleGradient)" stroke="#4A4A4A" stroke-width="1"/>

  <!-- Tours -->
  <rect x="10" y="25" width="15" height="40" fill="url(#castleGradient)" stroke="#4A4A4A" stroke-width="1"/>
  <rect x="75" y="25" width="15" height="40" fill="url(#castleGradient)" stroke="#4A4A4A" stroke-width="1"/>

  <!-- Toits -->
  <polygon points="17.5,25 10,15 25,15" fill="url(#roofGradient)"/>
  <polygon points="50,35 40,20 60,20" fill="url(#roofGradient)"/>
  <polygon points="82.5,25 75,15 90,15" fill="url(#roofGradient)"/>

  <!-- Créneaux -->
  <rect x="20" y="35" width="3" height="5" fill="url(#castleGradient)"/>
  <rect x="27" y="35" width="3" height="5" fill="url(#castleGradient)"/>
  <rect x="34" y="35" width="3" height="5" fill="url(#castleGradient)"/>
  <rect x="41" y="35" width="3" height="5" fill="url(#castleGradient)"/>
  <rect x="48" y="35" width="3" height="5" fill="url(#castleGradient)"/>
  <rect x="55" y="35" width="3" height="5" fill="url(#castleGradient)"/>
  <rect x="62" y="35" width="3" height="5" fill="url(#castleGradient)"/>
  <rect x="69" y="35" width="3" height="5" fill="url(#castleGradient)"/>
  <rect x="76" y="35" width="3" height="5" fill="url(#castleGradient)"/>

  <!-- Porte -->
  <rect x="45" y="50" width="10" height="15" fill="#2F2F2F" rx="5"/>

  <!-- Fenêtres -->
  <rect x="30" y="45" width="6" height="8" fill="#4169E1" opacity="0.7"/>
  <rect x="64" y="45" width="6" height="8" fill="#4169E1" opacity="0.7"/>
  <rect x="14" y="35" width="4" height="6" fill="#4169E1" opacity="0.7"/>
  <rect x="82" y="35" width="4" height="6" fill="#4169E1" opacity="0.7"/>

  <!-- Drapeaux -->
  <line x1="17.5" y1="15" x2="17.5" y2="8" stroke="#8B4513" stroke-width="1"/>
  <polygon points="17.5,8 17.5,12 23,10" fill="#FF4500"/>

  <line x1="50" y1="20" x2="50" y2="10" stroke="#8B4513" stroke-width="1"/>
  <polygon points="50,10 50,15 58,12.5" fill="#FFD700"/>

  <line x1="82.5" y1="15" x2="82.5" y2="8" stroke="#8B4513" stroke-width="1"/>
  <polygon points="82.5,8 82.5,12 88,10" fill="#32CD32"/>
</svg>