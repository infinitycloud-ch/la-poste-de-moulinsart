# 🎨 Configuration tmux pour Moulinsart - Style BD Tintin
# Utilisation : tmux -f ~/.tmux-moulinsart.conf

# ========================================
# Configuration Générale
# ========================================

# Support de la souris
set -g mouse on

# Index des fenêtres et panels commence à 1
set -g base-index 1
setw -g pane-base-index 1

# Historique plus grand
set -g history-limit 10000

# Temps de réponse rapide
set -s escape-time 0

# ========================================
# Thème Style BD Tintin
# ========================================

# Barre de status principale
set -g status-style 'bg=#1E3A8A fg=#FFFFFF bold'
set -g status-position bottom
set -g status-interval 1
set -g status-left-length 50
set -g status-right-length 50

# Partie gauche : Logo et session
set -g status-left '#[bg=#DC2626,fg=#FFFFFF,bold] 📮 MOULINSART #[bg=#1E3A8A,fg=#FFFFFF] Session: #S '

# Partie droite : Heure et infos
set -g status-right '#[bg=#059669,fg=#FFFFFF] 📧 Mail: ON #[bg=#7C3AED,fg=#FFFFFF] ⏰ %H:%M:%S '

# Format des fenêtres
set -g window-status-format '#[bg=#2563EB,fg=#FFFFFF] #I:#W '
set -g window-status-current-format '#[bg=#FBBF24,fg=#000000,bold] #I:#W* '

# ========================================
# Bordures et Panels
# ========================================

# Bordures des panels
set -g pane-border-style 'fg=#6B7280'
set -g pane-active-border-style 'fg=#3B82F6 bg=default bold'

# Afficher les titres des panels
set -g pane-border-status top
set -g pane-border-format ' #{?pane_active,#[fg=cyan bold],#[fg=white]}#{pane_title} '

# ========================================
# Raccourcis Personnalisés
# ========================================

# Préfixe : Ctrl+A (plus accessible que Ctrl+B)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Recharger la config
bind r source-file ~/.tmux-moulinsart.conf \; display-message "⚡ Config rechargée!"

# Split plus intuitifs
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigation avec les flèches
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Redimensionner avec Shift + flèches
bind -n S-Left resize-pane -L 5
bind -n S-Right resize-pane -R 5
bind -n S-Up resize-pane -U 5
bind -n S-Down resize-pane -D 5

# ========================================
# Commandes Spéciales Agents
# ========================================

# Envoyer email à Nestor (Préfixe + N)
bind N send-keys "curl http://localhost:1080/api/mailbox/nestor@moulinsart.local | jq" Enter

# Envoyer email à Tintin (Préfixe + T)
bind T send-keys "curl http://localhost:1080/api/mailbox/tintin@moulinsart.local | jq" Enter

# Synchroniser tous les panels (Préfixe + S)
bind S setw synchronize-panes \; display-message "🔄 Sync: #{?pane_synchronized,ON,OFF}"

# Clear tous les panels (Préfixe + C)
bind C send-keys -t moulinsart-agents:agents.0 "clear" Enter \; \
       send-keys -t moulinsart-agents:agents.1 "clear" Enter \; \
       send-keys -t moulinsart-agents:agents.2 "clear" Enter \; \
       send-keys -t moulinsart-agents:agents.3 "clear" Enter

# ========================================
# Messages et Notifications
# ========================================

set -g message-style 'bg=#FBBF24 fg=#000000 bold'
set -g message-command-style 'bg=#DC2626 fg=#FFFFFF bold'

# ========================================
# Mode Copie
# ========================================

# Utiliser les raccourcis vi
setw -g mode-keys vi

# Copier avec la souris
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ========================================
# Couleurs par Agent (pour identification)
# ========================================

# Note: Ces couleurs sont appliquées dans le script de lancement
# Nestor: Vert (#10B981)
# Tintin: Bleu (#3B82F6)
# Dupont1: Jaune (#FBBF24)
# Dupont2: Magenta (#8B5CF6)